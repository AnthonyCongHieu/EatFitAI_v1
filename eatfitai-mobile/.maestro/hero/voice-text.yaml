appId: com.eatfitai.app
name: voice-text
tags:
  - hero
  - android
---
- runFlow:
    file: ../subflows/start-authenticated.yaml
- tapOn:
    id: navigation-voice-tab-button
- extendedWaitUntil:
    visible:
      id: voice-screen
    timeout: 20000
- tapOn:
    id: voice-text-input
- setClipboard: ghi 1 banana vao bua sang
- pasteText
- hideKeyboard
- tapOn:
    id: voice-process-button
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: voice-result-card
    timeout: 90000
- assertVisible:
    id: voice-result-card
