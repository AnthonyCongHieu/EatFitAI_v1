appId: com.eatfitai.app
name: ai-scan-save
tags:
  - hero
  - android
---
- runFlow:
    file: ../subflows/start-authenticated.yaml
- tapOn:
    id: home-smart-add-fab
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: home-quick-add-scan-button
    timeout: 20000
- tapOn:
    id: home-quick-add-scan-button
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: ai-scan-screen
    timeout: 20000
- assertVisible:
    id: ai-scan-status-badge
- assertVisible:
    id: ai-scan-gallery-button
- assertVisible:
    id: ai-scan-capture-button
