appId: com.eatfitai.app
name: profile-stats
tags:
  - hero
  - android
---
- runFlow:
    file: ../subflows/start-authenticated.yaml
- tapOn:
    id: navigation-stats-tab-button
- extendedWaitUntil:
    visible:
      id: stats-screen
    timeout: 20000
- tapOn:
    id: stats-week-tab-button
- tapOn:
    id: stats-month-tab-button
- tapOn:
    id: stats-today-tab-button
- tapOn:
    id: navigation-profile-tab-button
- extendedWaitUntil:
    visible:
      id: profile-screen
    timeout: 20000
- assertVisible:
    id: profile-body-metrics-button
- assertVisible:
    id: profile-nutrition-settings-button
