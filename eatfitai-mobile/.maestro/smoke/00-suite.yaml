appId: com.eatfitai.app
name: smoke-suite
tags:
  - smoke
  - android
---
- runFlow:
    file: ../subflows/start-authenticated.yaml
- tapOn:
    id: home-smart-add-fab
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: home-quick-add-search-button
    timeout: 20000
- tapOn:
    id: home-quick-add-search-button
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: food-search-screen
    timeout: 20000
- assertVisible:
    id: food-search-query-input
- tapOn:
    id: food-search-query-input
- setClipboard: rice
- pasteText
- hideKeyboard
- tapOn:
    id: food-search-submit-button
    retryTapIfNoChange: true
- assertVisible:
    id: food-search-screen
- extendedWaitUntil:
    visible:
      id: food-search-add-first-item-button
    timeout: 20000
- tapOn:
    id: food-search-add-first-item-button
    retryTapIfNoChange: true
- back
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 20000
- scrollUntilVisible:
    element:
      id: home-view-diary-button
    direction: DOWN
    timeout: 20000
- tapOn:
    id: home-view-diary-button
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: meal-diary-screen
    timeout: 20000
- assertVisible:
    id: meal-diary-add-manual-button
