appId: com.eatfitai.app
name: meal-diary-smoke
tags:
  - smoke
  - android
---
- runFlow:
    file: ../subflows/start-authenticated.yaml
- tapOn:
    id: home-smart-add-fab
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: home-open-diary-button
    timeout: 20000
- tapOn:
    id: home-open-diary-button
- assertVisible:
    id: meal-diary-screen
- assertVisible:
    id: meal-diary-add-manual-button
