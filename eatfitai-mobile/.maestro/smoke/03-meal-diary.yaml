appId: com.eatfitai.app
name: meal-diary-smoke
tags:
  - smoke
  - android
---
- runFlow:
    file: ../subflows/start-authenticated.yaml
- runFlow:
    file: ../subflows/scroll-to-element.yaml
    env:
      TARGET_ID: home-view-diary-button
- tapOn:
    id: home-view-diary-button
- assertVisible:
    id: meal-diary-screen
- assertVisible:
    id: meal-diary-add-manual-button
