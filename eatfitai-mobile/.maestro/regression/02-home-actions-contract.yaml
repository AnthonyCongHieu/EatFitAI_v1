appId: com.eatfitai.app
name: home-actions-contract
tags:
  - regression
  - android
---
- runFlow:
    file: ../subflows/start-authenticated.yaml
- assertVisible:
    id: home-screen
- assertVisible:
    id: home-smart-add-fab
- tapOn:
    id: home-smart-add-fab
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: home-quick-add-search-button
    timeout: 20000
- assertVisible:
    id: home-quick-add-search-button
- assertVisible:
    id: home-quick-add-scan-button
- assertVisible:
    id: home-quick-add-voice-button
