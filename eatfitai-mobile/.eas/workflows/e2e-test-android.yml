name: e2e-test-android

on:
  pull_request:
    branches:
      - '*'
    paths:
      - eatfitai-mobile/**
      - '!eatfitai-mobile/**/*.md'
  workflow_dispatch:

jobs:
  build_android_for_e2e:
    name: Build Android APK for Maestro
    type: build
    environment: preview
    params:
      platform: android
      profile: preview

  maestro_smoke:
    name: Run Maestro smoke flows
    needs:
      - build_android_for_e2e
    type: maestro
    environment: preview
    params:
      build_id: ${{ needs.build_android_for_e2e.outputs.build_id }}
      flow_path:
        - .maestro/smoke/00-suite.yaml
