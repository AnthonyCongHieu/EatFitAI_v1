name: Keep-Alive Ping

on:
  schedule:
    # Chạy mỗi 14 phút (Render spin-down sau 15 phút)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Cho phép trigger thủ công

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Ping Backend DEV
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://eatfitai-backend-dev.onrender.com/health/ready)
          echo "Backend DEV: $STATUS"
          
      - name: Ping AI Provider DEV
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://eatfitai-ai-provider-dev.onrender.com/healthz)
          echo "AI Provider DEV: $STATUS"
          
      - name: Ping Backend PROD
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 \
            https://eatfitai-backend.onrender.com/health/ready)
          echo "Backend PROD: $STATUS"
          
      - name: Ping AI Provider PROD
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 \
            https://eatfitai-ai-provider.onrender.com/healthz)
          echo "AI Provider PROD: $STATUS"
