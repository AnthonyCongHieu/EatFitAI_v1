# render.yaml - Render Blueprint for EatFitAI cloud deployment

services:
  - type: web
    name: eatfitai-backend
    runtime: docker
    dockerfilePath: ./eatfitai-backend/Dockerfile
    dockerContext: ./eatfitai-backend
    region: singapore
    plan: free
    healthCheckPath: /health/ready
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__PreviousKeys
        sync: false
      - key: Encryption__Key
        sync: false
      - key: Encryption__PreviousKeys
        sync: false
      - key: Jwt__Issuer
        value: EatFitAI
      - key: Jwt__Audience
        value: EatFitAI
      - key: AIProvider__InternalToken
        sync: false
      - key: AIProvider__VisionBaseUrl
        value: https://eatfitai-ai-provider.onrender.com
      - key: Google__WebClientId
        sync: false
      - key: Google__AndroidClientId
        sync: false
      - key: Google__IosClientId
        sync: false
      - key: Supabase__Url
        sync: false
      - key: Supabase__ServiceRoleKey
        sync: false
      - key: Supabase__FoodImagesBucket
        value: food-images
      - key: Supabase__UserFoodBucket
        value: user-food
      - key: Brevo__ApiKey
        sync: false
      - key: Brevo__SenderEmail
        sync: false
      - key: Brevo__SenderName
        value: EatFitAI

  - type: web
    name: eatfitai-ai-provider
    runtime: docker
    dockerfilePath: ./ai-provider/Dockerfile
    dockerContext: ./ai-provider
    region: singapore
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_PROJECT_ID
        sync: false
      - key: GEMINI_API_KEY_PROJECT_ALIAS
        sync: false
      - key: GEMINI_API_KEY_ALIAS
        sync: false
      - key: GEMINI_EXTRA_KEY_POOL_JSON
        sync: false
      - key: GEMINI_EXHAUSTED_PROJECT_IDS
        sync: false
      - key: GEMINI_EXHAUSTED_UNTIL
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_KEY_POOL_JSON
        sync: false
      - key: GEMINI_RPM_LIMIT
        value: "5"
      - key: GEMINI_TPM_LIMIT
        value: "250000"
      - key: GEMINI_RPD_LIMIT
        value: "20"
      - key: GEMINI_TIMEOUT_SECONDS
        value: "30"
      - key: GEMINI_SHORT_COOLDOWN_SECONDS
        value: "90"
      - key: GEMINI_USAGE_STATE_PATH
        value: uploads/gemini-usage-state.json
      - key: GEMINI_PROBE_MIN_INTERVAL_SECONDS
        value: "600"
      - key: GEMINI_PROBE_MAX_PER_PROJECT_PER_DAY
        value: "3"
      - key: GEMINI_PROBE_PROMPT
        value: ping
      - key: ENABLE_STT
        value: "false"
