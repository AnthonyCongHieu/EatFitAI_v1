# render.yaml - Render Blueprint for EatFitAI cloud deployment

services:
  - type: web
    name: eatfitai-backend
    runtime: docker
    dockerfilePath: ./eatfitai-backend/Dockerfile
    dockerContext: ./eatfitai-backend
    region: singapore
    plan: free
    healthCheckPath: /health/ready
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: EatFitAI
      - key: Jwt__Audience
        value: EatFitAI
      - key: AIProvider__VisionBaseUrl
        sync: false
      - key: Google__WebClientId
        sync: false
      - key: Google__AndroidClientId
        sync: false
      - key: Google__IosClientId
        sync: false
      - key: Supabase__Url
        sync: false
      - key: Supabase__ServiceRoleKey
        sync: false
      - key: Supabase__FoodImagesBucket
        value: food-images
      - key: Supabase__UserFoodBucket
        value: user-food
      - key: Smtp__Host
        value: smtp.gmail.com
      - key: Smtp__Port
        value: "587"
      - key: Smtp__EnableSsl
        value: "true"
      - key: Smtp__User
        sync: false
      - key: Smtp__Password
        sync: false
      - key: Smtp__FromEmail
        sync: false
      - key: Smtp__FromDisplayName
        value: EatFitAI

  - type: web
    name: eatfitai-ai-provider
    runtime: docker
    dockerfilePath: ./ai-provider/Dockerfile
    dockerContext: ./ai-provider
    region: singapore
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_KEY_POOL_JSON
        sync: false
      - key: GEMINI_TIMEOUT_SECONDS
        value: "30"
      - key: GEMINI_SHORT_COOLDOWN_SECONDS
        value: "90"
      - key: ENABLE_STT
        value: "false"
